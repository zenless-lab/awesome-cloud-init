## template: jinja
#cloud-config

user:
  groups: [sudo, render, video]

packages:
  - wget
  - python3-setuptools
  - python3-wheel

runcmd:
  - |
    wget https://repo.radeon.com/amdgpu-install/7.2/ubuntu/{{ v1.distro_release }}/amdgpu-install_7.2.70200-1_all.deb
    apt-get install -y ./amdgpu-install_7.2.70200-1_all.deb
    apt-get update
    DEBIAN_FRONTEND=noninteractive apt-get install -y \
      "linux-headers-$(uname -r)" \
      "linux-modules-extra-$(uname -r)"
    DEBIAN_FRONTEND=noninteractive apt-get install -y \
      rocm \
      amdgpu-dkms
