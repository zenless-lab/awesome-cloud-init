#cloud-config
# Minimal configuration to install a modern Node.js and JavaScript development environment.
# Includes Node.js, npm, pnpm, yarn, deno, and bun.
# Targets compatible Linux distributions.

# Install Node.js and basic dependencies
packages:
  - curl
  - git
  - unzip

write_files:
  - path: /etc/skel/.bashrc
    owner: root:root
    permissions: '0644'
    append: true
    content: |
      # Node Version Manager (NVM) initialization
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" # This loads nvm
      [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # This loads nvm bash_completion

      # Deno and Bun initialization
      export DENO_INSTALL="$HOME/.deno"
      export BUN_INSTALL="$HOME/.bun"
      export PATH="$DENO_INSTALL/bin:$BUN_INSTALL/bin:$PATH"

# Post-installation steps to install package managers and alternative runtimes
runcmd:
  # Install NVM and the latest LTS version of Node.js, then set it as default
  - |
    export NVM_DIR="/etc/skel/.nvm"
    git clone https://github.com/nvm-sh/nvm.git "$NVM_DIR"
    cd "$NVM_DIR"
    git checkout `git describe --abbrev=0 --tags --match "v[0-9]*" $(git rev-list --tags --max-count=1)`
    . "$NVM_DIR/nvm.sh"
    nvm install --lts
    nvm use --lts
  # Enable corepack and prepare yarn and pnpm
  - |
    export COREPACK_HOME="/etc/skel/.cache/node/corepack"
    mkdir -p "$COREPACK_HOME"

    corepack enable yarn pnpm

    corepack prepare yarn@latest --activate
    corepack prepare pnpm@latest --activate
  # Copy nvm directory to the primary user's home and set ownership
  - cp -r /etc/skel/.nvm /home/$(id -nu 1000)/.nvm && chown -R 1000:1000 /home/$(id -nu 1000)/.nvm
  # Install Deno
  - |
    export DENO_INSTALL="/etc/skel/.deno"
    curl -fsSL https://deno.land/install.sh | sh
    cp -r /etc/skel/.deno /home/$(id -nu 1000)/.deno
    chown -R 1000:1000 /home/$(id -nu 1000)/.deno
  # Install Bun
  - |
    export BUN_INSTALL="/etc/skel/.bun"
    curl -fsSL https://bun.com/install | bash
    cp -r /etc/skel/.bun /home/$(id -nu 1000)/.bun
    chown -R 1000:1000 /home/$(id -nu 1000)/.bun
