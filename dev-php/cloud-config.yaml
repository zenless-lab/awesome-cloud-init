#cloud-config
# Minimal configuration to install a modern PHP development environment.
# Targets compatible Linux distributions.

# Install common dependencies and PHP extensions
packages:
  - curl
  - git
  - unzip
  - php-cli
  - php-fpm
  - php-mysql
  - php-sqlite3
  - php-zip
  - php-gd
  - php-mbstring
  - php-curl
  - php-xml
  - php-bcmath
  - php-intl
  - php-pear

# Post-installation steps to install Composer globally
runcmd:
  # Install Composer
  - |
    EXPECTED_SIGNATURE="$(curl -sS https://composer.github.io/installer.sig)"
    php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
    ACTUAL_SIGNATURE="$(php -r "echo hash_file('sha384', 'composer-setup.php');")"

    if [ "$EXPECTED_SIGNATURE" != "$ACTUAL_SIGNATURE" ]
    then
        >&2 echo 'ERROR: Invalid installer signature'
        rm composer-setup.php
        exit 1
    fi

    php composer-setup.php --quiet
    RESULT=$?
    rm composer-setup.php
    mv composer.phar /usr/local/bin/composer
    exit $RESULT
